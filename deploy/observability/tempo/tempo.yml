# ----------------------------------------------------------------------------
# Tempo — minimal single-binary config (demo)
# ----------------------------------------------------------------------------
# OTLP HTTP receiver :4318 — Spring Boot micrometer-tracing-bridge-otel
# buraya ship eder. gRPC :4317 alternatif client'lar için açık.
# HTTP API :3200 — Grafana datasource (Loki :3100 ile çakışmasın diye 3200).
# ----------------------------------------------------------------------------

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h        # demo: 1 gün

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
