# ----------------------------------------------------------------------------
# Grafana datasource provisioning — Prometheus + Tempo + Loki
# ----------------------------------------------------------------------------
# Cross-datasource navigation:
#   - Prometheus exemplar.trace_id  → Tempo (tıklayınca trace açılır)
#   - Loki derivedFields.traceId    → Tempo (log satırından trace'e link)
#   - Tempo tracesToLogsV2          → Loki (trace span'ından log'a sıçra)
# ----------------------------------------------------------------------------

apiVersion: 1

deleteDatasources:
  - name: Prometheus
  - name: Tempo
  - name: Loki

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        tags:
          - key: service.name
            value: service
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: traceId
          matcherType: label
          matcherRegex: traceId
          datasourceUid: tempo
          url: '$${__value.raw}'
          urlDisplayLabel: View Trace
