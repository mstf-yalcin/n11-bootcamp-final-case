# ----------------------------------------------------------------------------
# Loki — single-binary, filesystem storage (demo)
# ----------------------------------------------------------------------------
# Auth disabled (single-tenant). Production'da auth_enabled=true + multi-tenant.
# Storage: tsdb + filesystem chunk (S3/minio overkill demo için).
# ----------------------------------------------------------------------------

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 168h          # demo: 7 gün

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
