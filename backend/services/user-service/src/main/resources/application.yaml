server:
  port: 9000

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:${CONFIG_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: create
  h2:
    console:
      enabled: true
      path: /h2-console
      user: sa
  datasource:
    url: jdbc:h2:mem:authdb

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  endpoint:
    shutdown:
      enabled: true
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

endpoints:
  shutdown:
    enabled: true

jwt:
  issuer: ${JWT_ISSUER:n11-bootcamp}
  key-id: ${JWT_KEY_ID:n11-key-1}
  expire:
    time: ${JWT_EXPIRE_MINUTES:30}
  refresh-token:
    expire:
      time: ${JWT_REFRESH_EXPIRE_MINUTES:1440}
    hmac-secret: ${REFRESH_TOKEN_SECRET:n11BootcampRefreshTokenSecret1234!!}