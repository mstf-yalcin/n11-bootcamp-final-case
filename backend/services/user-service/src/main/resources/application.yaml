server:
  port: 9000

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:${CONFIG_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pass123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  defer-datasource-initialization: true
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

endpoints:
  shutdown:
    enabled: true

jwt:
  issuer: ${JWT_ISSUER:n11-bootcamp}
  key-id: ${JWT_KEY_ID:n11-key-1}
  expire:
    time: ${JWT_EXPIRE_MINUTES:30}
  refresh-token:
    expire:
      time: ${JWT_REFRESH_EXPIRE_MINUTES:1440}
    hmac-secret: ${REFRESH_TOKEN_SECRET:n11BootcampRefreshTokenSecret1234!!}