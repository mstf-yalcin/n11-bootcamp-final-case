server:
  port: 8761

spring:
  application:
    name: discovery-server
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    fetchRegistry: false
    registerWithEureka: false
    serviceUrl:
      defaultZOne: http://${eureka.instance.hostname}:${server.port}/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      probes:
        enabled: true
  health:
    probes:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
