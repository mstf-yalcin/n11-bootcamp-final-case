data:
  string: prod

server:
  port: 9000

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pass123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  defer-datasource-initialization: false
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,busrefresh,refresh
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: "${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}"

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
  level:
    root: INFO

endpoints:
  shutdown:
    enabled: true

jwt:
  issuer: ${JWT_ISSUER:n11-bootcamp}
  key-id: ${JWT_KEY_ID:n11-key-1}
  expire:
    time: ${JWT_EXPIRE_MINUTES:30}
  refresh-token:
    expire:
      time: ${JWT_REFRESH_EXPIRE_MINUTES:1440}
    hmac-secret: ${REFRESH_TOKEN_SECRET:n11BootcampRefreshTokenSecret1234!!}
