data:
  string: prod

server:
  port: 9500

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pass123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${USER_SERVICE_URL:http://localhost:9000}/.well-known/jwks.json

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,busrefresh,refresh
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: "${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}"

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
  level:
    root: INFO

payment:
  # mode: mock | sandbox  (prod'da sandbox -> gerçek Iyzico sandbox; live için PAYMENT_MODE=live + ayrı key'ler)
  mode: ${PAYMENT_MODE:sandbox}
  iyzico:
    api-key: ${IYZICO_API_KEY:your-iyzico-api-key}
    secret-key: ${IYZICO_SECRET_KEY:your-iyzico-secret-key}
    base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
    test-card:
      holder-name: ${IYZICO_TEST_HOLDER:John Doe}
      number: ${IYZICO_TEST_CARD_NUMBER:5528790000000008}
      expire-month: ${IYZICO_TEST_EXP_MONTH:12}
      expire-year: ${IYZICO_TEST_EXP_YEAR:2030}
      cvc: ${IYZICO_TEST_CVC:123}
