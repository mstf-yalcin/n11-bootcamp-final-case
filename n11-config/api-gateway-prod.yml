data:
  string: prod

server:
  port: 8080

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}

spring:
  application:
    name: api-gateway
  reactor:
    context-propagation: AUTO
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${USER_SERVICE_URL:http://localhost:9000}/.well-known/jwks.json
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/admin/users/**,/.well-known/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: user-service
                    fallbackUri: forward:/fallback/user
           
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**,/api/v1/admin/products/**,/api/v1/categories/**,/api/v1/tags/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: product-service
                    fallbackUri: forward:/fallback/product
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 1000ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/v1/cart/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: cart-service
                    fallbackUri: forward:/fallback/cart
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 1000ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**,/api/v1/admin/orders/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: order-service
                    fallbackUri: forward:/fallback/order
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 1000ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**,/api/v1/admin/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: payment-service
                    fallbackUri: forward:/fallback/payment
            
            - id: stock-service
              uri: lb://stock-service
              predicates:
                - Path=/api/v1/stocks/**,/api/v1/admin/reservations/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: stock-service
                    fallbackUri: forward:/fallback/stock
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 1000ms
                      factor: 2
                      basedOnPreviousValue: false                

            - id: user-service-api-docs
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - RewritePath=/v3/api-docs/user-service, /v3/api-docs

            - id: product-service-api-docs
              uri: lb://product-service
              predicates:
                - Path=/v3/api-docs/product-service
              filters:
                - RewritePath=/v3/api-docs/product-service, /v3/api-docs

            - id: cart-service-api-docs
              uri: lb://cart-service
              predicates:
                - Path=/v3/api-docs/cart-service
              filters:
                - RewritePath=/v3/api-docs/cart-service, /v3/api-docs

            - id: order-service-api-docs
              uri: lb://order-service
              predicates:
                - Path=/v3/api-docs/order-service
              filters:
                - RewritePath=/v3/api-docs/order-service, /v3/api-docs

            - id: payment-service-api-docs
              uri: lb://payment-service
              predicates:
                - Path=/v3/api-docs/payment-service
              filters:
                - RewritePath=/v3/api-docs/payment-service, /v3/api-docs

            - id: stock-service-api-docs
              uri: lb://stock-service
              predicates:
                - Path=/v3/api-docs/stock-service
              filters:
                - RewritePath=/v3/api-docs/stock-service, /v3/api-docs
    stream:
      bindings:
        springCloudBusInput:
          group: ${spring.application.name}-bus-${random.uuid}

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: product-service
        url: /v3/api-docs/product-service
      - name: cart-service
        url: /v3/api-docs/cart-service
      - name: order-service
        url: /v3/api-docs/order-service
      - name: payment-service
        url: /v3/api-docs/payment-service
      - name: stock-service
        url: /v3/api-docs/stock-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    gateway:
      access: read_only
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: "${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}"

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
  level:
    root: INFO

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      user-service:
        baseConfig: default
        waitDurationInOpenState: 15s
      product-service:
        baseConfig: default
        slidingWindowSize: 20
        permittedNumberOfCallsInHalfOpenState: 5
      cart-service:
        baseConfig: default
      order-service:
        baseConfig: default
        slidingWindowSize: 20
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 5
      payment-service:
        baseConfig: default
        waitDurationInOpenState: 15s
      stock-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
      user-service:
        baseConfig: default
        timeoutDuration: 3s
      product-service:
        baseConfig: default
      cart-service:
        baseConfig: default
      order-service:
        baseConfig: default
        timeoutDuration: 10s
      payment-service:
        baseConfig: default
        timeoutDuration: 10s
      stock-service:
        baseConfig: default

