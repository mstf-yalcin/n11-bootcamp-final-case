server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- gzip --------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        application/rss+xml
        text/javascript
        image/svg+xml;

    # ---- Static assets get long cache, hashed filenames ---------------------
    location ~* \.(?:css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- API proxy → api-gateway container (Docker network DNS) -------------
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gateway iç istekler için biraz daha cömert timeout.
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---- SPA fallback ------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html'i cache'leme ki yeni deploy hemen yansısın.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
